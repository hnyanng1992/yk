<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>几何数据展示工具</title>
    <link rel="stylesheet" href="https://a.amap.com/jsapi_demos/static/demo-center/css/demo-center.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body, #container {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 420px;
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            z-index: 10;
            max-height: 95vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .tool-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 360px;
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            border-radius: 12px;
            z-index: 10;
            max-height: 95vh;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tool-panel-title {
            font-size: 14px;
            font-weight: 700;
            color: #2f3d4a;
        }

        .tool-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .tool-panel-toggle {
            border: 1px solid #d4dbe6;
            background: #f8fafc;
            color: #334155;
            border-radius: 6px;
            width: 32px;
            height: 32px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .tool-panel-toggle:hover {
            background: #eef3f8;
        }

        .tool-panel-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tool-panel.collapsed {
            width: 220px;
            max-height: none;
        }

        .tool-panel.collapsed .tool-panel-body {
            display: none;
        }
        
        .panel-header {
            background: linear-gradient(135deg, #3388FF, #4A90E2);
            color: white;
            padding: 18px 20px;
            border-radius: 12px 12px 0 0;
            margin: 0;
            position: sticky;
            top: 0;
            z-index: 11;
            flex-shrink: 0;
        }
        
        .panel-header h3 {
            margin: 0;
            font-size: 20px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .panel-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid #eaeaea;
            margin-bottom: 0;
            background: white;
            z-index: 10;
            flex-shrink: 0;
            border-radius: 8px 8px 0 0;
            overflow: hidden;
        }
        
        .tab {
            flex: 1;
            padding: 14px 8px;
            text-align: center;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            font-size: 15px;
            font-weight: 500;
            color: #666;
        }
        
        .tab.active {
            border-bottom: 3px solid #3388FF;
            color: #3388FF;
            background-color: #f8fbff;
        }
        
        .current-tab-indicator {
            background: #e7f3ff;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 0;
            font-size: 14px;
            border-left: 4px solid #3388FF;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .current-tab-indicator::before {
            content: "📍";
            font-size: 16px;
        }
        
        .action-buttons {
            background: white;
            padding: 0 0 12px 0;
            margin: 0;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .main-button-group {
            display: flex;
            gap: 10px;
            margin: 0;
        }
        
        .main-button-group button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-primary {
            background: #3388FF;
            color: white;
        }
        
        .btn-primary:hover {
            background: #297acc;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(51, 136, 255, 0.3);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(108, 117, 125, 0.3);
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(40, 167, 69, 0.3);
        }

        .coord-picker-panel {
            border: 1px solid #dbe7ff;
            background: #f6f9ff;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .coord-picker-actions {
            display: flex;
            gap: 8px;
        }

        .btn-warning {
            background: #ff9f1a;
            color: #fff;
        }

        .btn-warning:hover {
            background: #f08c00;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(240, 140, 0, 0.28);
        }

        .btn-danger {
            background: #dc3545;
            color: #fff;
        }

        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(220, 53, 69, 0.28);
        }

        .coord-picker-actions button {
            flex: 1;
            padding: 9px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .coord-output {
            width: 100%;
            border: 1px solid #cfd9ee;
            border-radius: 6px;
            padding: 8px;
            font-size: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            background: #fff;
            min-height: 56px;
            resize: vertical;
        }


        .poi-panel {
            border: 1px solid #d8eee0;
            background: #f4fbf7;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .poi-panel-title {
            font-size: 12px;
            color: #2f6b45;
            font-weight: 600;
        }

        .poi-input {
            width: 100%;
            border: 1px solid #cfe3d7;
            border-radius: 6px;
            padding: 8px;
            font-size: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            background: #fff;
            min-height: 92px;
            resize: vertical;
        }

        .poi-actions {
            display: flex;
            gap: 8px;
        }

        .poi-actions button {
            flex: 1;
            padding: 9px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }
        
        .tab-content {
            display: none;
            flex: 1;
            flex-direction: column;
            gap: 12px;
        }
        
        .tab-content.active {
            display: flex;
        }
        
        .format-indicator {
            padding: 10px 14px;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 13px;
            border-left: 4px solid #28a745;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .format-indicator::before {
            content: "📋";
        }
        
        .format-indicator.wkt {
            border-left-color: #3388FF;
        }
        
        .format-indicator.coords {
            border-left-color: #28a745;
        }
        
        .input-item {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }
        
        .input-item textarea {
            width: 100%;
            flex: 1;
            min-height: 320px;
            margin: 0;
            padding: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            box-sizing: border-box;
            line-height: 1.6;
            transition: border 0.3s;
        }
        
        .input-item textarea:focus {
            border-color: #3388FF;
            outline: none;
            box-shadow: 0 0 0 2px rgba(51, 136, 255, 0.2);
        }
        
        .format-example {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            font-style: italic;
            flex-shrink: 0;
            padding: 0 4px;
        }
        
        .legend {
            padding: 14px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 12px;
            border-top: 1px solid #eee;
            margin-top: 10px;
        }
        
        .legend-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #444;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .legend-title::before {
            content: "🎨";
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin: 6px 0;
        }
        
        .legend-color {
            width: 20px;
            height: 4px;
            margin-right: 8px;
            border-radius: 2px;
        }
        
        .legend-point {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .legend-line {
            background-color: #3388FF;
        }
        
        .legend-polygon {
            background-color: #FF6B6B;
        }
        
        .legend-point-color {
            background-color: #28a745;
        }
        
        .status-message {
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        
        .status-error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .intersection-panel {
            display: none;
            border: 1px solid #ffd3cf;
            background: #fff5f4;
            border-radius: 8px;
            padding: 10px 12px;
            margin-top: 8px;
            font-size: 12px;
        }

        .intersection-panel-title {
            color: #b42318;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .intersection-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 110px;
            overflow-y: auto;
        }

        .intersection-link {
            border: none;
            background: transparent;
            color: #0b63ce;
            text-align: left;
            cursor: pointer;
            padding: 0;
            font-size: 12px;
        }

        .intersection-link:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .control-panel {
                width: calc(100% - 40px);
                max-height: 85vh;
            }
            .tool-panel {
                width: calc(100% - 40px);
                top: auto;
                left: 20px;
                right: 20px;
                bottom: 20px;
                max-height: 40vh;
            }
            .input-item textarea {
                min-height: 250px;
            }
            .panel-content {
                gap: 12px;
            }
            .main-button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="container"></div>
    
    <div class="control-panel">
        <div class="panel-header">
            <h3>几何数据展示工具</h3>
        </div>
        
        <div class="panel-content">
            <!-- 标签导航 -->
            <div class="tabs">
                <div class="tab" data-tab="points">点数据</div>
                <div class="tab" data-tab="lines">线数据</div>
                <div class="tab active" data-tab="polygons">多边形数据</div>
            </div>
            
            <!-- 当前选中指示器 -->
            <div class="current-tab-indicator" id="current-tab-indicator">
                当前选中: <strong>多边形数据</strong>
            </div>
            
            <!-- 操作按钮 -->
            <div class="action-buttons">
                <div class="main-button-group">
                    <button class="btn-success" id="show-current-btn">
                        <span>🔍</span> 显示当前图形
                    </button>
                    <button class="btn-primary" id="show-all-btn">
                        <span>🗺️</span> 显示所有图形
                    </button>
                    <button class="btn-secondary" id="clear-all-btn">
                        <span>🗑️</span> 清除所有
                    </button>
                </div>
            </div>
            
            <!-- 点数据标签页 -->
            <div class="tab-content" id="points-tab">
                <div class="format-indicator" id="points-format-indicator">
                    检测到格式: <strong>WKT</strong>
                </div>
                <div class="input-item">
                    <textarea id="points-input" placeholder="请输入点数据 (WKT或坐标串)">POINT (104.065603 30.641998)</textarea>
                </div>
                <div class="format-example">
                    提示: 支持 POINT/MULTIPOINT 或坐标串格式
                </div>
            </div>
            
            <!-- 线数据标签页 -->
            <div class="tab-content" id="lines-tab">
                <div class="format-indicator" id="lines-format-indicator">
                    检测到格式: <strong>WKT</strong>
                </div>
                <div class="input-item">
                    <textarea id="lines-input" placeholder="请输入线数据 (WKT或坐标串)">MULTILINESTRING ((116.4279376 39.8443999,116.4278987 39.8444812,116.4278609 39.8445569))</textarea>
                </div>
                <div class="format-example">
                    提示: 支持 LINESTRING/MULTILINESTRING 或坐标串格式
                </div>
            </div>
            
            <!-- 多边形数据标签页 -->
            <div class="tab-content active" id="polygons-tab">
                <div class="format-indicator" id="polygon-format-indicator">
                    检测到格式: <strong>WKT</strong>
                </div>
                <div class="input-item">
                    <textarea id="polygon-input" placeholder="请输入多边形数据，支持以下格式：
MULTIPOLYGON(((116.267 40.143, ...)), ((116.278 40.150, ...)))">MULTIPOLYGON (((116.267554 40.143674, 116.276690 40.146418, 116.279322 40.147106, 116.280005 40.144965, 116.283973 40.146092, 116.285033 40.146355, 116.289183 40.147556, 116.290073 40.146855, 116.290675 40.145969, 116.287825 40.144879, 116.288980 40.141879, 116.289029 40.141727, 116.292728 40.142273, 116.293094 40.142339, 116.295110 40.142508, 116.302110 40.143200, 116.302768 40.140103, 116.297349 40.139644, 116.297428 40.139241, 116.292626 40.138913, 116.290668 40.138374, 116.286600 40.138182, 116.283331 40.138137, 116.277863 40.137829, 116.277319 40.139720, 116.276325 40.139594, 116.275799 40.139680, 116.275014 40.140193, 116.274188 40.139238, 116.273272 40.138283, 116.271391 40.137550, 116.271312 40.137856, 116.271185 40.140226, 116.271226 40.141041, 116.269384 40.140577, 116.268609 40.142467, 116.268572 40.142557, 116.267884 40.142589, 116.267786 40.142671, 116.267554 40.143674)), ((116.278184 40.150960, 116.284874 40.152902, 116.285020 40.152947, 116.285938 40.151100, 116.279006 40.149139, 116.278184 40.150960)), ((116.241132 40.154537, 116.245402 40.155578, 116.246149 40.154617, 116.249661 40.155446, 116.250890 40.153510, 116.245508 40.152263, 116.245339 40.152220, 116.241132 40.154537)))</textarea>
                </div>
                <div class="format-example">
                    提示: 多边形数据支持坐标串和WKT(POLYGON/MULTIPOLYGON)格式
                </div>
            </div>
            
            <div class="status-message" id="status-message"></div>
            
            <div class="legend">
                <div class="legend-title">图例说明</div>
                <div class="legend-item">
                    <div class="legend-point legend-point-color"></div>
                    <span>点数据</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-line"></div>
                    <span>线数据</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-polygon"></div>
                    <span>多边形数据</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color:#ff3b30;height:6px;"></div>
                    <span>自相交高亮</span>
                </div>
            </div>

            <div class="intersection-panel" id="intersection-panel">
                <div class="intersection-panel-title" id="intersection-panel-title">⚠️ 检测到多边形自相交，点击可定位：</div>
                <ul class="intersection-list" id="intersection-list"></ul>
            </div>
        </div>
    </div>

    <div class="tool-panel collapsed" id="tool-panel">
        <div class="tool-panel-header">
            <div class="tool-panel-title">坐标拾取 / POI工具栏</div>
            <button class="tool-panel-toggle" id="toggle-tool-panel-btn" type="button" title="展开工具栏" aria-label="展开工具栏">⚙️</button>
        </div>
        <div class="tool-panel-body" id="tool-panel-body">
            <div class="coord-picker-panel">
                <div class="coord-picker-actions">
                    <button class="btn-warning" id="toggle-pick-btn">📍 开启戳点拾取</button>
                    <button class="btn-danger" id="copy-coord-btn">📋 复制坐标</button>
                </div>
                <textarea id="picked-coord-output" class="coord-output" readonly placeholder="点击“开启戳点拾取”后，在图面点击任意位置获取坐标"></textarea>
            </div>

            <div class="poi-panel">
                <div class="poi-panel-title">POI标注（格式：名称：lng,lat，每行一个）</div>
                <textarea id="poi-input" class="poi-input" placeholder="清河之洲：116.3060, 40.0188
温榆河公园：116.4851, 40.0863"></textarea>
                <div class="poi-actions">
                    <button class="btn-success" id="show-poi-btn">🏷️ 标注POI</button>
                    <button class="btn-secondary" id="clear-poi-btn">🧹 清除POI</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cache.amap.com/lbs/static/es5.min.js"></script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=1cf9fc45df860df45e87af1230f5da74"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化地图
            var map = new AMap.Map('container', {
                zoom: 14,
                center: [116.276, 40.145], // 调整为沙河附近
                viewMode: '3D'
            });
            
            var points = [], lines = [], polygons = [], poiMarkers = [], polygonDiagnostics = [], intersectionAlerts = [], pickedCoordMarker = null, pickMode = false, currentTab = 'polygons'; // merge-resolved: keep diagnostics state

            function normalizeInputText(text) {
                return (text || '')
                    .replace(/[，]/g, ',')
                    .replace(/[；]/g, ';')
                    .replace(/[｜]/g, '|')
                    .replace(/\u3000/g, ' ');
            }

            // 自动检测格式
            function detectFormat(input, type) {
                if (!input || input.trim() === '') return 'unknown';
                var normalized = normalizeInputText(input);
                var text = normalized.trim().toUpperCase();
                if (type === 'points') {
                    if (text.startsWith('MULTIPOINT') || text.startsWith('POINT')) return 'wkt';
                } else if (type === 'lines') {
                    if (text.startsWith('MULTILINESTRING') || text.startsWith('LINESTRING')) return 'wkt';
                } else if (type === 'polygons') {
                    if (text.startsWith('MULTIPOLYGON') || text.startsWith('POLYGON')) return 'wkt';
                }
                if (extractCoordinatePairs(normalized).length > 0) return 'coords';
                return 'unknown';
            }

            function extractCoordinatePairs(text) {
                var normalized = normalizeInputText(text);
                var matches = normalized.match(/-?\d+(?:\.\d+)?\s*[, ]\s*-?\d+(?:\.\d+)?/g) || [];
                return matches.map(m => {
                    var parts = m.trim().split(/[, ]+/);
                    return [parseFloat(parts[0]), parseFloat(parts[1])];
                }).filter(pair => !isNaN(pair[0]) && !isNaN(pair[1]));
            }

            function normalizePolygonRing(coords) {
                if (coords.length > 2) {
                    var first = coords[0], last = coords[coords.length - 1];
                    if (first[0] !== last[0] || first[1] !== last[1]) coords.push([first[0], first[1]]);
                }
                return coords;
            }

            function clearPolygonDiagnostics() {
                polygonDiagnostics.forEach(item => map.remove(item));
                polygonDiagnostics = [];
                intersectionAlerts = [];
                renderIntersectionAlerts([]);
            }

            function formatCoord(coord) {
                return `${coord[0].toFixed(6)}, ${coord[1].toFixed(6)}`;
            }

            function renderIntersectionAlerts(items) {
                var panel = document.getElementById('intersection-panel');
                var title = document.getElementById('intersection-panel-title');
                var list = document.getElementById('intersection-list');
                if (!panel || !list || !title) return;

                list.innerHTML = '';
                if (!items || items.length === 0) {
                    panel.style.display = 'none';
                    return;
                }

                title.textContent = `⚠️ 检测到 ${items.length} 处原始连线自相交（图面编号已标注），点击可定位异常线段：`;

                items.forEach((item, index) => {
                    var li = document.createElement('li');
                    var button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'intersection-link';
                    button.textContent = `图面编号#${item.pointNo}：线段[${item.segA + 1}] ${formatCoord(item.a1)} → ${formatCoord(item.a2)} 与 线段[${item.segB + 1}] ${formatCoord(item.b1)} → ${formatCoord(item.b2)}`;
                    button.addEventListener('click', function () {
                        var overlays = [];
                        if (item.marker) overlays.push(item.marker);
                        if (item.segAOverlay) overlays.push(item.segAOverlay);
                        if (item.segBOverlay) overlays.push(item.segBOverlay);
                        if (overlays.length > 0) {
                            map.setFitView(overlays);
                        } else {
                            map.setZoomAndCenter(Math.max(map.getZoom(), 17), item.point);
                        }

                        showStatus(`已定位到第 ${index + 1} 处自相交（原始线段异常）`, true);

                        [item.segAOverlay, item.segBOverlay].forEach(function (seg) {
                            if (!seg) return;
                            seg.setOptions({ strokeWeight: 8, strokeColor: '#d92d20' });
                            setTimeout(function () {
                                seg.setOptions({ strokeWeight: 6, strokeColor: '#ff3b30' });
                            }, 700);
                        });

                        if (item.marker) {
                            item.marker.setOptions({ radius: 10, fillOpacity: 1 });
                            setTimeout(function () {
                                item.marker.setOptions({ radius: 7, fillOpacity: 0.9 });
                            }, 700);

                    });
                    li.appendChild(button);
                    list.appendChild(li);
                });

            }

            function segmentIntersection(a, b, c, d) {
                var EPS = 1e-10;

                function cross(p1, p2, p3) {
                    return (p2[0] - p1[0]) * (p3[1] - p1[1]) - (p2[1] - p1[1]) * (p3[0] - p1[0]);
                }

                function orient(p1, p2, p3) {
                    var v = cross(p1, p2, p3);
                    if (Math.abs(v) <= EPS) return 0;
                    return v > 0 ? 1 : -1;
                }

                function onSegment(p1, p2, q, tol) {
                    var T = (typeof tol === 'number') ? tol : EPS;
                    return q[0] >= Math.min(p1[0], p2[0]) - T && q[0] <= Math.max(p1[0], p2[0]) + T &&
                           q[1] >= Math.min(p1[1], p2[1]) - T && q[1] <= Math.max(p1[1], p2[1]) + T;
                }

                function lineIntersection(p1, p2, p3, p4) {
                    var x1 = p1[0], y1 = p1[1], x2 = p2[0], y2 = p2[1];
                    var x3 = p3[0], y3 = p3[1], x4 = p4[0], y4 = p4[1];
                    var den = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
                    if (Math.abs(den) <= EPS) return null;

                    var det1 = x1 * y2 - y1 * x2;
                    var det2 = x3 * y4 - y3 * x4;
                    var px = (det1 * (x3 - x4) - (x1 - x2) * det2) / den;
                    var py = (det1 * (y3 - y4) - (y1 - y2) * det2) / den;
                    return [px, py];
                }

                var o1 = orient(a, b, c);
                var o2 = orient(a, b, d);
                var o3 = orient(c, d, a);
                var o4 = orient(c, d, b);

                if (o1 === 0 && onSegment(a, b, c)) return [c[0], c[1]];
                if (o2 === 0 && onSegment(a, b, d)) return [d[0], d[1]];
                if (o3 === 0 && onSegment(c, d, a)) return [a[0], a[1]];
                if (o4 === 0 && onSegment(c, d, b)) return [b[0], b[1]];

                if (o1 !== o2 && o3 !== o4) {
                    var pt = lineIntersection(a, b, c, d);
                    if (pt) return pt;
                }

                // 兜底：对“几乎相交”的数值情况再做一次容差判断，避免漏检尖角自相交
                var fallback = lineIntersection(a, b, c, d);
                if (fallback && onSegment(a, b, fallback, 1e-8) && onSegment(c, d, fallback, 1e-8)) {
                    return fallback;
                }

                return null;
            }

            function detectRingSelfIntersections(ring) {
                if (!ring || ring.length < 4) return [];
                var intersections = [];
                var seen = new Set();

                for (var i = 0; i < ring.length - 1; i++) {
                    var a1 = ring[i], a2 = ring[i + 1];
                    for (var j = i + 1; j < ring.length - 1; j++) {
                        if (Math.abs(i - j) <= 1) continue;
                        if (i === 0 && j === ring.length - 2) continue;

                        var b1 = ring[j], b2 = ring[j + 1];
                        var point = segmentIntersection(a1, a2, b1, b2);
                        if (!point) continue;

                        var key = point[0].toFixed(10) + ',' + point[1].toFixed(10) + ':' + i + '-' + j;
                        if (seen.has(key)) continue;
                        seen.add(key);
                        intersections.push({ point: point, segA: i, segB: j, a1: a1, a2: a2, b1: b1, b2: b2 });
                    }
                }

                // 额外检测：非相邻重复顶点（常见于自相交/回折导致的非法 AOI）
                var vertexBucket = {};
                for (var k = 0; k < ring.length - 1; k++) {
                    var vKey = ring[k][0].toFixed(10) + ',' + ring[k][1].toFixed(10);
                    if (!vertexBucket[vKey]) vertexBucket[vKey] = [];
                    vertexBucket[vKey].push(k);
                }

                Object.keys(vertexBucket).forEach(function(vKey) {
                    var indexes = vertexBucket[vKey];
                    if (indexes.length < 2) return;

                    for (var x = 0; x < indexes.length; x++) {
                        for (var y = x + 1; y < indexes.length; y++) {
                            var i = indexes[x], j = indexes[y];
                            if (Math.abs(i - j) <= 1) continue;
                            if (i === 0 && j === ring.length - 2) continue;

                            var dupKey = vKey + ':dup:' + i + '-' + j;
                            if (seen.has(dupKey)) continue;
                            seen.add(dupKey);

                            var a1 = ring[i], a2 = ring[i + 1];
                            var b1 = ring[j], b2 = ring[j + 1];
                            intersections.push({
                                point: ring[i],
                                segA: i,
                                segB: j,
                                a1: a1,
                                a2: a2,
                                b1: b1,
                                b2: b2,
                                isDuplicateVertex: true
                            });
                        }
                    }
                });

                return intersections;
            }

            function highlightSelfIntersections(path) {
                var rings = (path.length > 0 && Array.isArray(path[0][0])) ? path : [path];
                var segmentOverlays = {};
                var pointMarkers = {};
                var pointLabels = {};
                var pointCounter = 0;
                var alerts = [];

                function getSegmentOverlay(ring, ringIndex, segIndex) {
                    var key = ringIndex + ':' + segIndex;
                    if (segmentOverlays[key]) return segmentOverlays[key];
                    var segLine = new AMap.Polyline({
                        path: [ring[segIndex], ring[segIndex + 1]],
                        strokeColor: '#ff3b30',
                        strokeWeight: 6,
                        strokeOpacity: 0.9,
                        lineJoin: 'round',
                        zIndex: 70
                    });
                    map.add(segLine);
                    polygonDiagnostics.push(segLine);
                    segmentOverlays[key] = segLine;
                    return segLine;
                }

                rings.forEach((ring, ringIndex) => {
                    var intersections = detectRingSelfIntersections(ring);

                    intersections.forEach(hit => {
                        var pointKey = hit.point[0].toFixed(7) + ',' + hit.point[1].toFixed(7);
                        var marker = pointMarkers[pointKey];
                        if (!marker) {
                            marker = new AMap.CircleMarker({
                                center: hit.point,
                                radius: 7,
                                strokeColor: '#ff3b30',
                                strokeWeight: 2,
                                strokeOpacity: 1,
                                fillColor: '#ffd6d3',
                                fillOpacity: 0.9,
                                zIndex: 80
                            });
                            map.add(marker);
                            polygonDiagnostics.push(marker);
                            pointMarkers[pointKey] = marker;

                            pointCounter += 1;
                            var label = new AMap.Marker({
                                position: hit.point,
                                offset: new AMap.Pixel(10, -16),
                                content: `<div style="background:#d92d20;color:#fff;border:2px solid #fff;border-radius:12px;padding:1px 7px;font-size:12px;font-weight:700;line-height:18px;box-shadow:0 2px 6px rgba(0,0,0,.35);">#${pointCounter}</div>`,
                                zIndex: 90
                            });
                            map.add(label);
                            polygonDiagnostics.push(label);
                            pointLabels[pointKey] = { no: pointCounter, overlay: label };
                        }

                        var segAOverlay = getSegmentOverlay(ring, ringIndex, hit.segA);
                        var segBOverlay = getSegmentOverlay(ring, ringIndex, hit.segB);

                        alerts.push({
                            point: hit.point,
                            marker: marker,
                            segA: hit.segA,
                            segB: hit.segB,
                            a1: hit.a1,
                            a2: hit.a2,
                            b1: hit.b1,
                            b2: hit.b2,
                            segAOverlay: segAOverlay,
                            segBOverlay: segBOverlay,
                            pointNo: pointLabels[pointKey] ? pointLabels[pointKey].no : '-'
                        });
                    });
                });

                return alerts;
            }

            function addPolygonWithDiagnostics(path) {
                var polygon = new AMap.Polygon({
                    path: path,
                    strokeColor: '#FF6B6B',
                    strokeWeight: 3,
                    strokeOpacity: 0.8,
                    fillColor: '#FF6B6B',
                    fillOpacity: 0.35
                });
                map.add(polygon);
                polygons.push(polygon);
                return highlightSelfIntersections(path);
            }

            // 线数据展示（支持 WKT/坐标串）
            function showLines() {
                lines.forEach(line => map.remove(line)); lines = [];
                var input = document.getElementById('lines-input').value.trim();
                if (!input) return;
                
                try {
                    var format = detectFormat(input, 'lines');

                    if (format === 'wkt') {
                        var parts = input.match(/\([^()]+\)/g) || [];
                        parts.forEach(part => {
                            var coords = extractCoordinatePairs(part);
                            if (coords.length > 1) {
                                var line = new AMap.Polyline({ path: coords, strokeColor: '#3388FF', strokeWeight: 4 });
                                map.add(line);
                                lines.push(line);
                            }
                        });
                    } else {
                        var lineTexts = normalizeInputText(input).split(/\n+|;/).map(t => t.trim()).filter(Boolean);
                        if (lineTexts.length <= 1) lineTexts = [input];
                        lineTexts.forEach(text => {
                            var coords = extractCoordinatePairs(text);
                            if (coords.length > 1) {
                                var line = new AMap.Polyline({ path: coords, strokeColor: '#3388FF', strokeWeight: 4 });
                                map.add(line);
                                lines.push(line);
                            }
                        });
                    }

                    if (lines.length > 0) {
                        map.setFitView(lines);
                        showStatus(`成功添加 ${lines.length} 条线`, true);
                    } else {
                        showStatus('未能解析线数据', false);
                    }
                } catch (e) { showStatus('解析线数据出错', false); }
            }

            // 多边形数据展示（支持 WKT/坐标串）
            function showPolygons() {
                polygons.forEach(p => map.remove(p)); polygons = [];
                clearPolygonDiagnostics();
                var input = document.getElementById('polygon-input').value.trim();
                if (!input) { showStatus('输入为空', false); return; }

                // 预处理文本：去除换行，标准化空格
                var cleanInput = input.replace(/[\r\n]+/g, ' ').replace(/\s+/g, ' ').toUpperCase();
                var count = 0;
                var intersectionCount = 0;
                var intersections = [];

                try {
                    // 解析坐标对的辅助函数 "x y, x y" -> [[x,y], [x,y]]
                    function parseRing(str) { return normalizePolygonRing(extractCoordinatePairs(str)); }

                    if (cleanInput.includes('MULTIPOLYGON')) {
                        // 提取最外层括号内容
                        var inner = cleanInput.substring(cleanInput.indexOf('((') + 1, cleanInput.lastIndexOf('))') + 2); // 粗略提取
                        // 使用正则匹配 ((...)) 结构，解决 split 无法处理空格的问题
                        // 正则含义：匹配 (( 开头，中间是非 ( 的字符，以 )) 结尾（处理单个不含洞的多边形）
                        // 如果有洞（如 ((..), (..))），此正则需更复杂，但针对你的数据，以下逻辑足够：
                        
                        // 修复逻辑：使用正则 \)\s*,\s*\( 作为分隔符逻辑，或者直接抓取块
                        // 针对 MULTIPOLYGON (((A)), ((B))) 格式
                        var subPolys = inner.match(/\(\([^\(]+\)\)/g);

                        if (subPolys) {
                            subPolys.forEach(polyStr => {
                                // 每个 polyStr 形如 ((x y, x y...))
                                // AMap 支持直接传二维数组作为 path
                                var ringStr = polyStr.match(/\([^)]+\)/g); // 提取环
                                if (ringStr) {
                                    var path = [];
                                    ringStr.forEach(r => path.push(parseRing(r)));
                                    
                                    intersections = intersections.concat(addPolygonWithDiagnostics(path));
                                    count++;
                                }
                            });
                        }
                    } else if (cleanInput.includes('POLYGON')) {
                        // 处理单个 POLYGON
                        var ringStr = cleanInput.match(/\([^)]+\)/g);
                        if (ringStr) {
                            var path = [];
                            ringStr.forEach(r => path.push(parseRing(r)));
                            intersections = intersections.concat(addPolygonWithDiagnostics(path));
                            count++;
                        }
                    } else {
                        // 坐标串格式：
                        // 1) 单个面：x,y;x,y;...（支持你提供的长坐标串）
                        // 2) 多个面：用换行分隔不同面
                        // 3) 洞：同一面内用 | 分隔外环与内环
                        var normalized = normalizeInputText(input);
                        var polygonTexts = normalized.split(/\n+/).map(t => t.trim()).filter(Boolean);
                        if (polygonTexts.length === 0) polygonTexts = [normalized];

                        polygonTexts.forEach(polyText => {
                            var ringTexts = polyText.split('|').map(t => t.trim()).filter(Boolean);
                            var path = ringTexts.map(parseRing).filter(ring => ring.length > 3);
                            if (path.length > 0) {
                                intersections = intersections.concat(addPolygonWithDiagnostics(path.length === 1 ? path[0] : path));
                                count++;
                            }
                        });
                    }

                    if (count > 0) {
                        var message = `成功绘制 ${count} 个地块`;
                        intersectionCount = intersections.length;
                        if (intersectionCount > 0) message += `，检测到 ${intersectionCount} 处自相交`;
                        else message += '，未检测到自相交';
                        showStatus(message, true);
                        renderIntersectionAlerts(intersections);
                        intersectionAlerts = intersections;
                        map.setFitView(polygons.concat(polygonDiagnostics));
                    } else {
                        showStatus('未能解析多边形数据', false);
                    }
                } catch (e) {
                    console.error(e);
                    showStatus('解析错误: ' + e.message, false);
                }
            }

            });

            document.getElementById('show-current-btn').addEventListener('click', showCurrent);
            document.getElementById('show-all-btn').addEventListener('click', showAll);
            document.getElementById('clear-all-btn').addEventListener('click', clearAll);
            document.getElementById('toggle-tool-panel-btn').addEventListener('click', toggleToolPanel);
            document.getElementById('toggle-pick-btn').addEventListener('click', function () { setPickMode(!pickMode); });
            document.getElementById('copy-coord-btn').addEventListener('click', copyPickedCoord);
            document.getElementById('show-poi-btn').addEventListener('click', showPoiMarkers);
            document.getElementById('clear-poi-btn').addEventListener('click', function () { clearPoiMarkers(); showStatus('已清除POI标注', true); });

            setTimeout(function() { 
                updateCurrentTabIndicator();
                updateFormatIndicator('points');
                updateFormatIndicator('lines');
                updateFormatIndicator('polygons');
                showAll();
            }, 500);
        });
    </script>
</body>
</html>
